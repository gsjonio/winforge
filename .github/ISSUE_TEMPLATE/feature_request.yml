name: Feature request
description: Suggest a capability for winforge.
labels: ["type: feat", "semver: minor"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that winforge makes hard or impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should it do? A concrete command or flag helps.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This is one topic, not several bundled together.
          required: true
        - label: I checked this does not need a new external dependency (or I explained why it does).
