name: Security Checks

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.ps1'
      - '.github/workflows/security.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.ps1'
  schedule:
    - cron: '0 0 * * 0'  # Weekly scan

jobs:
  powershell-security:
    name: PowerShell Security Analysis
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run PSScriptAnalyzer security rules
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -Confirm:$false

          $rules = @(
            'PSAvoidUsingPlainTextForPassword',
            'PSAvoidUsingConvertToSecureStringWithPlainText',
            'PSAvoidUsingUsernameAndPasswordParams',
            'PSAvoidUsingInvokeExpression',
            'PSAvoidUsingComputerNameHardcoded'
          )

          $results = Invoke-ScriptAnalyzer -Path "." -Recurse -IncludeRule $rules

          if ($results) {
            Write-Host "Security issues found:"
            $results | Format-Table -AutoSize
            exit 1
          } else {
            Write-Host "No security issues detected"
          }

  credential-scan:
    name: Credential Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true
