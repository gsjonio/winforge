name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Generate release notes from CHANGELOG
        id: notes
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Extract the English CHANGELOG section for this version: everything
          # between "## [<version>]" and the next "## [" header, dropping the
          # header line, any '---' rules, and leading/trailing blank lines.
          notes=$(awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { flag = 1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' CHANGELOG.md | sed '/^---$/d' | sed -e '/./,$!d' | tac | sed -e '/./,$!d' | tac)

          if [ -z "$notes" ]; then
            notes=$(printf '## Release %s\n\nSee [CHANGELOG.md](CHANGELOG.md) for details.' "$VERSION")
          fi

          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            README.md
            CHANGELOG.md
            .pslintrc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify release
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          echo "✓ Release v$VERSION created successfully"
          echo "📦 Tag: $TAG"
